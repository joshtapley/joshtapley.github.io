<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTT Miniature Gallery</title>
<style>
  :root {
    --gap: 10px;
    --bg: #14161a;
    --panel: #1f232a;
    --text: #eaeaea;
    --muted: #9aa0a6;
    --accent: #5b8def;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--panel);
    padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  h1 {
    margin: 0 0 10px 0;
    font-size: 18px;
    font-weight: 600;
  }
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .controls input,
  .controls select {
    flex: 1 1 200px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #12141a;
    color: var(--text);
    font-size: 14px;
  }
  .controls input:focus,
  .controls select:focus {
    outline: 2px solid var(--accent);
  }
  .meta {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--gap);
    padding: 16px;
  }
  @media (max-width: 640px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  .card {
    background: var(--panel);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 0.1s ease;
  }
  .card:hover {
    transform: translateY(-2px);
  }
  .thumb-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #0d0f13;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .thumb-fallback {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 8px;
    word-break: break-word;
  }
  .caption {
    font-size: 11px;
    padding: 6px 8px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }
  .card {
    cursor: pointer;
  }
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .lightbox.open {
    display: flex;
  }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
  }
  .lightbox-close {
    position: fixed;
    top: 16px;
    right: 24px;
    font-size: 36px;
    line-height: 1;
    color: #fff;
    cursor: pointer;
    user-select: none;
    z-index: 1001;
  }
  .lightbox-close:hover {
    color: var(--accent);
  }
</style>
</head>
<body>

<header>

    <select id="termSelect">

  </div>
  <div class="meta" id="resultCount"></div>
</header>

<div class="grid" id="grid"></div>

const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const termSelect = document.getElementById('termSelect');
const resultCount = document.getElementById('resultCount');
const emptyState = document.getElementById('emptyState');

function escapeRegex(str) {
  return str.replace(/[.+?^${}()|[\]\\]/g, '\\$&');
}

function matchesQuery(name, query) {
  if (!query) return true;
  const pattern = query.split('*').map(escapeRegex).join('.*');
  try {
    return new RegExp(pattern, 'i').test(name);
  } catch (e) {
    return name.toLowerCase().includes(query.toLowerCase());
  }
}

// Build the "common terms" dropdown from the filenames themselves.
function buildTermOptions() {
  const stoplist = new Set(['color', 'a', 'b', 'c', 'd', 'e', 'f', 'png']);
  const counts = new Map();

  DATA.forEach(([name]) => {
    const base = name.replace(/\.png$/i, '');
    const tokens = base.split(/[_\s]+/).map(t => t.toLowerCase()).filter(Boolean);
    tokens.forEach(t => {
      if (stoplist.has(t) || /^\d+$/.test(t) || t.length < 3) return;
      counts.set(t, (counts.get(t) || 0) + 1);
    });
  });

  const terms = [...counts.entries()]
    .filter(([, count]) => count >= 3)
    .sort((a, b) => a[0].localeCompare(b[0]));

  terms.forEach(([term, count]) => {
    const opt = document.createElement('option');
    opt.value = term;
    opt.textContent = `${term} (${count})`;
    termSelect.appendChild(opt);
  });
}

function render() {
  const query = searchInput.value.trim();
  const term = termSelect.value;

  const filtered = DATA.filter(([name]) => {
    const lower = name.toLowerCase();
    return matchesQuery(name, query) && (!term || lower.includes(term));
  });

  grid.innerHTML = '';
  filtered.forEach(([name, id]) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', () => openLightbox(id, name));

    const thumbWrap = document.createElement('div');
    thumbWrap.className = 'thumb-wrap';

    const img = document.createElement('img');
    img.src = `https://drive.google.com/thumbnail?id=${id}&sz=w400`;
    img.alt = name;
    img.loading = 'lazy';
    img.onerror = () => {
      thumbWrap.innerHTML = '';
      const fallback = document.createElement('div');
      fallback.className = 'thumb-fallback';
      fallback.textContent = name;
      thumbWrap.appendChild(fallback);
    };

    thumbWrap.appendChild(img);

    const caption = document.createElement('div');
    caption.className = 'caption';
    caption.textContent = name;
    caption.title = name;

    card.appendChild(thumbWrap);
    card.appendChild(caption);
    grid.appendChild(card);
  });

  resultCount.textContent = `${filtered.length} of ${DATA.length} images`;
  emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
  grid.style.display = filtered.length === 0 ? 'none' : 'grid';
}

searchInput.addEventListener('input', render);
termSelect.addEventListener('change', render);

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

function openLightbox(id, name) {
  lightboxImg.src = `https://drive.google.com/thumbnail?id=${id}&sz=w1600`;
  lightboxImg.alt = name;
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});

buildTermOptions();
render();
</script>
